<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Test</title>
    <style>
        :root {
            --background-color: #18181b;
            --text-color: #e0e0e0;
            --main-accent-color: #00ff41;
            --border-color: #444448;
            --input-background: #232326;
            --button-background: #2a2a2e;
        }

        body {
            background: var(--background-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .test-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .test-btn {
            padding: 10px 20px;
            background: var(--button-background);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            cursor: pointer;
            border-radius: 4px;
        }

        .test-btn:hover {
            background: var(--main-accent-color);
            color: var(--background-color);
        }

        /* Modal System Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--background-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            transform: scale(0.7);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-title {
            color: var(--main-accent-color);
            font-size: 1.2em;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .modal-message {
            color: var(--text-color);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: var(--input-background);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: var(--button-background);
            color: var(--text-color);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            min-width: 80px;
        }

        .modal-btn:hover {
            background: var(--main-accent-color);
            color: var(--background-color);
        }

        .modal-btn.primary {
            background: var(--main-accent-color);
            color: var(--background-color);
        }

        .modal-btn.primary:hover {
            background: #00cc52;
        }

        .modal-btn.danger {
            background: #ef7a7a;
            color: var(--background-color);
        }

        .modal-btn.danger:hover {
            background: #e05a5a;
        }
    </style>
</head>
<body>
    <h1>Тест модальных окон</h1>
    
    <div class="test-buttons">
        <button class="test-btn" onclick="testAlert()">Test Alert</button>
        <button class="test-btn" onclick="testConfirm()">Test Confirm</button>
        <button class="test-btn" onclick="testPrompt()">Test Prompt</button>
    </div>

    <div id="results"></div>

    <!-- Modal System -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-message" id="modal-message"></div>
            <input type="text" id="modal-input" class="modal-input" style="display: none;">
            <div class="modal-buttons" id="modal-buttons"></div>
        </div>
    </div>

    <script>
    // Modal System
    class ModalSystem {
        constructor() {
            this.overlay = document.getElementById('modal-overlay');
            this.title = document.getElementById('modal-title');
            this.message = document.getElementById('modal-message');
            this.input = document.getElementById('modal-input');
            this.buttons = document.getElementById('modal-buttons');
            this.resolve = null;
            this.reject = null;
        }

        show(title, message, options) {
            if (!options) options = {};
            return new Promise((resolve, reject) => {
                this.resolve = resolve;
                this.reject = reject;
                
                this.title.textContent = title;
                this.message.textContent = message;
                
                // Show/hide input
                if (options.showInput) {
                    this.input.style.display = 'block';
                    this.input.value = options.defaultValue || '';
                    this.input.focus();
                } else {
                    this.input.style.display = 'none';
                }
                
                // Create buttons
                this.buttons.innerHTML = '';
                
                if (options.type === 'confirm') {
                    this.createButton('Отмена', 'modal-btn', () => this.resolve(false));
                    this.createButton('OK', 'modal-btn primary', () => {
                        if (options.showInput) {
                            this.resolve(this.input.value);
                        } else {
                            this.resolve(true);
                        }
                    });
                } else if (options.type === 'prompt') {
                    this.createButton('Отмена', 'modal-btn', () => this.resolve(null));
                    this.createButton('OK', 'modal-btn primary', () => this.resolve(this.input.value));
                } else {
                    this.createButton('OK', 'modal-btn primary', () => this.resolve());
                }
                
                this.overlay.classList.add('show');
            });
        }

        createButton(text, className, onClick) {
            const button = document.createElement('button');
            button.textContent = text;
            button.className = className;
            button.addEventListener('click', () => {
                onClick();
                this.hide();
            });
            this.buttons.appendChild(button);
        }

        hide() {
            this.overlay.classList.remove('show');
        }
    }

    // Initialize modal system
    const modalSystem = new ModalSystem();

    // Override native alert, confirm, prompt
    window.alert = function(message) {
        return modalSystem.show('Уведомление', message);
    };

    window.confirm = function(message) {
        return modalSystem.show('Подтверждение', message, { type: 'confirm' });
    };

    window.prompt = function(message, defaultValue) {
        if (!defaultValue) defaultValue = '';
        return modalSystem.show('Ввод', message, { 
            type: 'prompt', 
            showInput: true, 
            defaultValue: defaultValue 
        });
    };

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) {
            modalSystem.hide();
            if (modalSystem.reject) {
                modalSystem.reject();
            }
        }
    });

    // Handle Enter key for input
    document.getElementById('modal-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const okButton = document.querySelector('.modal-btn.primary');
            if (okButton) {
                okButton.click();
            }
        }
    });

    // Test functions
    async function testAlert() {
        await alert('Это тестовое уведомление!');
        document.getElementById('results').innerHTML += '<p>Alert закрыт</p>';
    }

    async function testConfirm() {
        const result = await confirm('Вы уверены, что хотите продолжить?');
        document.getElementById('results').innerHTML += '<p>Confirm результат: ' + result + '</p>';
    }

    async function testPrompt() {
        const result = await prompt('Введите ваше имя:', 'Гость');
        document.getElementById('results').innerHTML += '<p>Prompt результат: ' + result + '</p>';
    }
    </script>
</body>
</html>
