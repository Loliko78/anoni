<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Test</title>
    <style>
        :root {
            --background-color: #18181b;
            --text-color: #e0e0e0;
            --main-accent-color: #00ff41;
            --border-color: #444448;
            --input-background: #232326;
            --button-background: #2a2a2e;
        }

        body {
            background: var(--background-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .test-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .test-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #2a2a2e 0%, #1a1a1e 100%);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .test-btn:hover {
            background: linear-gradient(135deg, var(--main-accent-color) 0%, #00cc52 100%);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 65, 0.3);
        }

        /* Modal System Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a1e 0%, #2a2a2e 100%);
            border: 2px solid var(--main-accent-color);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            box-shadow: 
                0 0 40px rgba(0, 255, 65, 0.4),
                0 20px 60px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: scale(0.8) translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--main-accent-color), transparent);
            animation: scanline 2s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .modal-overlay.show .modal {
            transform: scale(1) translateY(0);
        }

        .modal-title {
            color: var(--main-accent-color);
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            letter-spacing: 1px;
            position: relative;
        }

        .modal-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--main-accent-color), transparent);
        }

        .modal-message {
            color: var(--text-color);
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.6;
            font-size: 1.1em;
            padding: 0 10px;
        }

        .modal-input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 24px;
            background: rgba(35, 35, 43, 0.8);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--main-accent-color);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            background: rgba(35, 35, 43, 0.9);
        }

        .modal-input::placeholder {
            color: rgba(176, 176, 195, 0.6);
        }

        .modal-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 14px 28px;
            border: 2px solid var(--border-color);
            background: linear-gradient(135deg, #2a2a2e 0%, #1a1a1e 100%);
            color: var(--text-color);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 120px;
            font-size: 1.1em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .modal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .modal-btn:hover::before {
            left: 100%;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, var(--main-accent-color) 0%, #00cc52 100%);
            color: #000;
            border-color: var(--main-accent-color);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .modal-btn.primary:hover {
            background: linear-gradient(135deg, #00cc52 0%, var(--main-accent-color) 100%);
            box-shadow: 0 8px 25px rgba(0, 255, 65, 0.4);
        }

        .modal-btn.danger {
            background: linear-gradient(135deg, #ef7a7a 0%, #e05a5a 100%);
            color: #000;
            border-color: #ef7a7a;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .modal-btn.danger:hover {
            background: linear-gradient(135deg, #e05a5a 0%, #ef7a7a 100%);
            box-shadow: 0 8px 25px rgba(239, 122, 122, 0.4);
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .modal {
                max-width: 90%;
                padding: 24px;
                margin: 20px;
            }
            
            .modal-title {
                font-size: 1.5em;
            }
            
            .modal-message {
                font-size: 1em;
            }
            
            .modal-input {
                padding: 14px 16px;
                font-size: 1em;
            }
            
            .modal-btn {
                padding: 12px 24px;
                min-width: 100px;
                font-size: 1em;
            }
            
            .modal-buttons {
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .modal {
                max-width: 95%;
                padding: 20px;
                margin: 10px;
            }
            
            .modal-title {
                font-size: 1.3em;
            }
            
            .modal-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .modal-btn {
                width: 100%;
                min-width: auto;
            }
        }

        .results {
            background: rgba(35, 35, 43, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .results h3 {
            color: var(--main-accent-color);
            margin-top: 0;
        }
    </style>
</head>
<body>
    <h1>Тест модальных окон</h1>
    
    <div class="test-buttons">
        <button class="test-btn" onclick="testAlert()">Test Alert</button>
        <button class="test-btn" onclick="testConfirm()">Test Confirm</button>
        <button class="test-btn" onclick="testPrompt()">Test Prompt</button>
        <button class="test-btn" onclick="testCustomModal()">Custom Modal</button>
    </div>

    <div class="results">
        <h3>Результаты:</h3>
        <div id="results"></div>
    </div>

    <!-- Modal System -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-message" id="modal-message"></div>
            <input type="text" id="modal-input" class="modal-input" style="display: none;">
            <div class="modal-buttons" id="modal-buttons"></div>
        </div>
    </div>

    <script>
    // Modal System
    class ModalSystem {
        constructor() {
            this.overlay = document.getElementById('modal-overlay');
            this.title = document.getElementById('modal-title');
            this.message = document.getElementById('modal-message');
            this.input = document.getElementById('modal-input');
            this.buttons = document.getElementById('modal-buttons');
            this.resolve = null;
            this.reject = null;
        }

        show(title, message, options) {
            if (!options) options = {};
            return new Promise((resolve, reject) => {
                this.resolve = resolve;
                this.reject = reject;
                
                this.title.textContent = title;
                this.message.textContent = message;
                
                // Show/hide input
                if (options.showInput) {
                    this.input.style.display = 'block';
                    this.input.value = options.defaultValue || '';
                    this.input.focus();
                } else {
                    this.input.style.display = 'none';
                }
                
                // Create buttons
                this.buttons.innerHTML = '';
                
                if (options.type === 'confirm') {
                    this.createButton('Отмена', 'modal-btn', () => this.resolve(false));
                    this.createButton('OK', 'modal-btn primary', () => {
                        if (options.showInput) {
                            this.resolve(this.input.value);
                        } else {
                            this.resolve(true);
                        }
                    });
                } else if (options.type === 'prompt') {
                    this.createButton('Отмена', 'modal-btn', () => this.resolve(null));
                    this.createButton('OK', 'modal-btn primary', () => this.resolve(this.input.value));
                } else {
                    this.createButton('OK', 'modal-btn primary', () => this.resolve());
                }
                
                this.overlay.classList.add('show');
            });
        }

        createButton(text, className, onClick) {
            const button = document.createElement('button');
            button.textContent = text;
            button.className = className;
            button.addEventListener('click', () => {
                onClick();
                this.hide();
            });
            this.buttons.appendChild(button);
        }

        hide() {
            this.overlay.classList.remove('show');
        }
    }

    // Initialize modal system
    const modalSystem = new ModalSystem();

    // Override native alert, confirm, prompt
    window.alert = function(message) {
        return modalSystem.show('Уведомление', message);
    };

    window.confirm = function(message) {
        return modalSystem.show('Подтверждение', message, { type: 'confirm' });
    };

    window.prompt = function(message, defaultValue) {
        if (!defaultValue) defaultValue = '';
        return modalSystem.show('Ввод', message, { 
            type: 'prompt', 
            showInput: true, 
            defaultValue: defaultValue 
        });
    };

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) {
            modalSystem.hide();
            if (modalSystem.reject) {
                modalSystem.reject();
            }
        }
    });

    // Handle Enter key for input
    document.getElementById('modal-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const okButton = document.querySelector('.modal-btn.primary');
            if (okButton) {
                okButton.click();
            }
        }
    });

    // Test functions
    async function testAlert() {
        await alert('Это тестовое уведомление с новым дизайном!');
        document.getElementById('results').innerHTML += '<p>✅ Alert закрыт</p>';
    }

    async function testConfirm() {
        const result = await confirm('Вы уверены, что хотите продолжить?');
        document.getElementById('results').innerHTML += '<p>✅ Confirm результат: ' + result + '</p>';
    }

    async function testPrompt() {
        const result = await prompt('Введите ваше имя:', 'Гость');
        document.getElementById('results').innerHTML += '<p>✅ Prompt результат: ' + result + '</p>';
    }

    async function testCustomModal() {
        const result = await modalSystem.show('Кастомное окно', 'Это пример кастомного модального окна с красивым дизайном!', { type: 'confirm' });
        document.getElementById('results').innerHTML += '<p>✅ Кастомное окно результат: ' + result + '</p>';
    }
    </script>
</body>
</html>
