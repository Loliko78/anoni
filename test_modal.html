<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест модальных окон</title>
    <link rel="stylesheet" href="static/modal.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111112;
            color: #e0e0e0;
            padding: 20px;
        }
        .test-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            background: #444448;
            color: #e0e0e0;
            border: 1px solid #2a2a2d;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: #66666a;
        }
    </style>
</head>
<body>
    <h1>Тест модальных окон</h1>
    
    <div class="test-buttons">
        <button onclick="showKeyModal()" class="btn">Управление ключами</button>
        <button onclick="showGroupModal()" class="btn">Управление группой</button>
    </div>

    <!-- Modal для управления ключами -->
    <div id="keyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Управление ключами</h3>
                <button class="close-btn" onclick="closeKeyModal()" title="Закрыть">✕</button>
            </div>
            <div class="modal-body">
                <div class="key-section">
                    <h4>Текущий ключ:</h4>
                    <div class="current-key" id="currentKey">Не установлен</div>
                </div>
                <div class="key-section">
                    <h4>Установить новый ключ:</h4>
                    <input type="text" id="newKey" placeholder="Введите ключ шифрования" class="form-control">
                    <button onclick="setKey()" class="btn btn-primary">Установить ключ</button>
                </div>
                <div class="key-section">
                    <h4>Генерация ключа:</h4>
                    <button onclick="generateKey()" class="btn btn-secondary">Сгенерировать новый ключ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal для управления группой -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Управление группой</h3>
                <button class="close-btn" onclick="closeGroupModal()" title="Закрыть">✕</button>
            </div>
            <div class="modal-body">
                <div class="group-section">
                    <h4>Участники группы:</h4>
                    <div class="members-list">
                        <div class="member-item">
                            <img src="static/avatars/cybermask.svg" style="width:32px;height:32px;">
                            <span>Пользователь 1</span>
                            <button class="btn btn-danger">Удалить</button>
                        </div>
                        <div class="member-item">
                            <img src="static/avatars/hacker.svg" style="width:32px;height:32px;">
                            <span>Пользователь 2</span>
                            <button class="btn btn-danger">Удалить</button>
                        </div>
                    </div>
                </div>
                <div class="group-section">
                    <h4>Добавить участника по нику:</h4>
                    <input type="text" id="newMemberNickname" placeholder="Введите ник пользователя" class="form-control">
                    <button class="btn btn-primary">Добавить по нику</button>
                </div>
                <div class="group-section">
                    <h4>Пригласительная ссылка:</h4>
                    <div class="invite-link-container">
                        <input type="text" id="inviteLink" value="http://example.com/group/join/abc123" readonly class="form-control">
                        <button class="btn btn-secondary">Копировать ссылку</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showKeyModal() {
            console.log('showKeyModal вызвана');
            const modal = document.getElementById('keyModal');
            if (modal) {
                modal.classList.add('show');
                console.log('Модальное окно ключей открыто');
            }
        }

        function closeKeyModal() {
            const modal = document.getElementById('keyModal');
            if (modal) {
                modal.classList.remove('show');
            }
        }

        function showGroupModal() {
            console.log('showGroupModal вызвана');
            const modal = document.getElementById('groupModal');
            if (modal) {
                modal.classList.add('show');
                console.log('Модальное окно группы открыто');
            }
        }

        function closeGroupModal() {
            const modal = document.getElementById('groupModal');
            if (modal) {
                modal.classList.remove('show');
            }
        }

        function setKey() {
            const newKey = document.getElementById('newKey').value;
            if (newKey) {
                document.getElementById('currentKey').textContent = newKey;
                document.getElementById('newKey').value = '';
                closeKeyModal();
                alert('Ключ установлен!');
            }
        }

        function generateKey() {
            const key = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            document.getElementById('newKey').value = key;
        }

        // Закрытие модальных окон при клике вне их
        window.addEventListener('click', function(event) {
            const keyModal = document.getElementById('keyModal');
            const groupModal = document.getElementById('groupModal');
            
            if (event.target == keyModal) {
                keyModal.classList.remove('show');
            }
            if (event.target == groupModal) {
                groupModal.classList.remove('show');
            }
        });
    </script>
</body>
</html>
